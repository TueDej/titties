<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palette</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0e1311;
            min-height: 100vh;
            overflow: hidden;
            font-family: monospace;
            cursor: crosshair;
        }
        .title {
            position: fixed;
            bottom: 2.5rem;
            left: 2.5rem;
            z-index: 100;
            mix-blend-mode: difference;
        }
        .title h1 {
            font-size: 0.7rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-weight: normal;
            color: #7aa48d;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1),
                        filter 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: crosshair;
        }
        .orb:hover {
            transform: scale(1.15) !important;
            filter: brightness(1.2);
            z-index: 50 !important;
        }
        .orb .info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .orb:hover .info { opacity: 1; }
        .orb .info .name {
            font-size: 0.6rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            display: block;
            margin-bottom: 0.3rem;
        }
        .orb .info .hex {
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            opacity: 0.6;
        }

        .o1 {
            width: 340px; height: 340px;
            background: #161d1a;
            top: 5%; left: 8%;
            animation: drift 18s ease-in-out infinite alternate;
        }
        .o2 {
            width: 220px; height: 220px;
            background: #222222;
            top: 12%; left: 28%;
            animation: drift 22s ease-in-out infinite alternate-reverse;
        }
        .o3 {
            width: 400px; height: 400px;
            background: #295340;
            top: -5%; right: 15%;
            animation: drift 20s ease-in-out infinite alternate;
        }
        .o4 {
            width: 160px; height: 160px;
            background: #478061;
            top: 35%; left: 5%;
            animation: drift 16s ease-in-out infinite alternate-reverse;
        }
        .o5 {
            width: 280px; height: 280px;
            background: #7aa48d;
            top: 30%; left: 35%;
            animation: drift 24s ease-in-out infinite alternate;
        }
        .o6 {
            width: 120px; height: 120px;
            background: #cccccc;
            top: 15%; right: 8%;
            animation: drift 14s ease-in-out infinite alternate-reverse;
        }
        .o7 {
            width: 200px; height: 200px;
            background: #395b70;
            bottom: 10%; left: 15%;
            animation: drift 19s ease-in-out infinite alternate;
        }
        .o8 {
            width: 300px; height: 300px;
            background: #5a4575;
            bottom: 5%; right: 20%;
            animation: drift 21s ease-in-out infinite alternate-reverse;
        }
        .o9 {
            width: 150px; height: 150px;
            background: #7a3d44;
            top: 55%; left: 55%;
            animation: drift 17s ease-in-out infinite alternate;
        }
        .o10 {
            width: 240px; height: 240px;
            background: #755935;
            top: 50%; right: 5%;
            animation: drift 23s ease-in-out infinite alternate-reverse;
        }
        .o11 {
            width: 180px; height: 180px;
            background: #0e1311;
            border: 1px solid #222222;
            top: 70%; left: 40%;
            animation: drift 15s ease-in-out infinite alternate;
        }

        .o1 .info  { color: #478061; }
        .o2 .info  { color: #7aa48d; }
        .o3 .info  { color: #7aa48d; }
        .o4 .info  { color: #0e1311; }
        .o5 .info  { color: #0e1311; }
        .o6 .info  { color: #161d1a; }
        .o7 .info  { color: #cccccc; }
        .o8 .info  { color: #cccccc; }
        .o9 .info  { color: #cccccc; }
        .o10 .info { color: #cccccc; }
        .o11 .info { color: #478061; }

        @keyframes drift {
            0%   { transform: translate(0, 0) rotate(0deg); }
            33%  { transform: translate(15px, -20px) rotate(1deg); }
            66%  { transform: translate(-10px, 15px) rotate(-1deg); }
            100% { transform: translate(5px, -10px) rotate(0.5deg); }
        }

        @media (max-width: 768px) {
            .orb { transform: scale(0.5) !important; }
            .o1  { width: 200px; height: 200px; top: 2%; left: 2%; }
            .o2  { width: 130px; height: 130px; top: 8%; left: 30%; }
            .o3  { width: 220px; height: 220px; top: -5%; right: 5%; }
            .o4  { width: 100px; height: 100px; top: 25%; left: 0%; }
            .o5  { width: 160px; height: 160px; top: 22%; left: 30%; }
            .o6  { width: 80px; height: 80px; top: 10%; right: 5%; }
            .o7  { width: 120px; height: 120px; bottom: 15%; left: 5%; }
            .o8  { width: 170px; height: 170px; bottom: 8%; right: 8%; }
            .o9  { width: 90px; height: 90px; top: 50%; left: 50%; }
            .o10 { width: 140px; height: 140px; top: 45%; right: 0%; }
            .o11 { width: 110px; height: 110px; top: 65%; left: 35%; }
        }
    </style>
</head>
<body>

    <div class="title">
        <h1>Palette</h1>
    </div>

    <div class="orb o1">
        <div class="info"><span class="name">VOID SLATE</span><span class="hex">#161d1a</span></div>
    </div>
    <div class="orb o2">
        <div class="info"><span class="name">CHARCOAL</span><span class="hex">#222222</span></div>
    </div>
    <div class="orb o3">
        <div class="info"><span class="name">ABYSS GREEN</span><span class="hex">#295340</span></div>
    </div>
    <div class="orb o4">
        <div class="info"><span class="name">ACCENT GREEN</span><span class="hex">#478061</span></div>
    </div>
    <div class="orb o5">
        <div class="info"><span class="name">MINT TINT</span><span class="hex">#7aa48d</span></div>
    </div>
    <div class="orb o6">
        <div class="info"><span class="name">STARLIGHT</span><span class="hex">#cccccc</span></div>
    </div>
    <div class="orb o7">
        <div class="info"><span class="name">ECLIPSE BLUE</span><span class="hex">#395b70</span></div>
    </div>
    <div class="orb o8">
        <div class="info"><span class="name">PULSAR PURPLE</span><span class="hex">#5a4575</span></div>
    </div>
    <div class="orb o9">
        <div class="info"><span class="name">NOVA RED</span><span class="hex">#7a3d44</span></div>
    </div>
    <div class="orb o10">
        <div class="info"><span class="name">SOLAR AMBER</span><span class="hex">#755935</span></div>
    </div>
    <div class="orb o11">
        <div class="info"><span class="name">DARK ABYSS</span><span class="hex">#0e1311</span></div>
    </div>

</body>
</html>
