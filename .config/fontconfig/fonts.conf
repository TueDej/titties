<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

	<!-- Windows Sans -->
	<alias binding="strong">
		<family>Arial</family>
		<prefer>
			<family>sans-serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Calibri</family>
		<prefer>
			<family>sans-serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Verdana</family>
		<prefer>
			<family>sans-serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Segoe UI</family>
		<prefer>
			<family>sans-serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Tahoma</family>
		<prefer>
			<family>sans-serif</family>
		</prefer>
	</alias>

	<!-- Windows Serif -->
	<alias binding="strong">
		<family>Times New Roman</family>
		<prefer>
			<family>serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Cambria</family>
		<prefer>
			<family>serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Georgia</family>
		<prefer>
			<family>serif</family>
		</prefer>
	</alias>

	<!-- Windows Monospace -->
	<alias binding="strong">
		<family>Courier New</family>
		<prefer>
			<family>monospace</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Consolas</family>
		<prefer>
			<family>monospace</family>
		</prefer>
	</alias>

	<!-- macOS -->
	<alias binding="strong">
		<family>Helvetica</family>
		<prefer>
			<family>sans-serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Helvetica Neue</family>
		<prefer>
			<family>sans-serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>San Francisco</family>
		<prefer>
			<family>sans-serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>-apple-system</family>
		<prefer>
			<family>sans-serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Times</family>
		<prefer>
			<family>serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Monaco</family>
		<prefer>
			<family>monospace</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Menlo</family>
		<prefer>
			<family>monospace</family>
		</prefer>
	</alias>

	<!-- Web -->
	<alias binding="strong">
		<family>system-ui</family>
		<prefer>
			<family>sans-serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>ui-sans-serif</family>
		<prefer>
			<family>sans-serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>ui-serif</family>
		<prefer>
			<family>serif</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>ui-monospace</family>
		<prefer>
			<family>monospace</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>Courier</family>
		<prefer>
			<family>monospace</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>Liberation Mono</family>
		<prefer>
			<family>monospace</family>
		</prefer>
	</alias>
	<alias binding="strong">
		<family>DejaVu Sans Mono</family>
		<prefer>
			<family>monospace</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>serif</family>
		<prefer>
			<family>IBM Plex Serif</family>
			<family>Iranian Serif</family>
			<family>Noto Serif</family>
			<family>Noto Serif CJK SC</family>
			<family>Noto Serif CJK TC</family>
			<family>Noto Serif CJK JP</family>
			<family>Noto Serif CJK KR</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>sans-serif</family>
		<prefer>
			<family>Inter</family>
			<family>Iranian Sans</family>
			<family>Noto Sans</family>
			<family>Noto Sans CJK SC</family>
			<family>Noto Sans CJK TC</family>
			<family>Noto Sans CJK JP</family>
			<family>Noto Sans CJK KR</family>
		</prefer>
	</alias>

	<alias binding="strong">
		<family>monospace</family>
		<prefer>
			<family>SF Mono</family>
			<family>Hack</family>
			<family>Iranian Sans</family>
			<family>Noto Sans Mono</family>
			<family>Noto Sans Mono CJK SC</family>
			<family>Noto Sans Mono CJK TC</family>
			<family>Noto Sans Mono CJK JP</family>
			<family>Noto Sans Mono CJK KR</family>
		</prefer>
	</alias>

	<match target="pattern">
		<test name="family" qual="any">
			<string>serif</string>
		</test>
		<edit name="family" mode="append" binding="weak">
			<family>Symbols Nerd Font</family>
			<family>Font Awesome 6 Free</family>
			<family>Font Awesome 6 Brands</family>
			<family>Noto Color Emoji</family>
			<family>Noto Emoji</family>
		</edit>
	</match>

	<match target="pattern">
		<test name="family" qual="any">
			<string>sans-serif</string>
		</test>
		<edit name="family" mode="append" binding="weak">
			<family>Symbols Nerd Font</family>
			<family>Font Awesome 6 Free</family>
			<family>Font Awesome 6 Brands</family>
			<family>Noto Color Emoji</family>
			<family>Noto Emoji</family>
		</edit>
	</match>

	<match target="pattern">
		<test name="family" qual="any">
			<string>monospace</string>
		</test>
		<edit name="family" mode="append" binding="weak">
			<family>Symbols Nerd Font</family>
			<family>Font Awesome 6 Free</family>
			<family>Font Awesome 6 Brands</family>
			<family>Noto Color Emoji</family>
			<family>Noto Emoji</family>
		</edit>
	</match>

    <match target="font">
        <edit name="hinting" mode="assign"><bool>true</bool></edit>
        <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
        <edit name="rgba" mode="assign"><const>rgb</const></edit>
        <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
    </match>

</fontconfig>
