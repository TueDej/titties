[main]
font=Annotation Mono Regular Upright Italic:size=18
icon-theme=Flat-Remix-Blue-Dark

width=42
lines=9
line-height=29

tabs=2

horizontal-pad=12
vertical-pad=8
inner-pad=8

terminal=foot -a '{cmd}' -T '{cmd}' {cmd}

[border]
width=2
radius=11
selection-radius=5

[colors]
background=#0e1311ff
text=#ccccccff
prompt=#ccccccff
placeholder=#555555ff
input=#ccccccff
match=#7aa48dff
selection=#295340ff
selection-text=#ccccccff
selection-match=#478061ff
counter=#7aa48dff
border=#295340ff
