[main]
font=Annotation Mono Regular Upright Italic:size=18
icon-theme=Flat-Remix-Blue-Dark

width=42
lines=9
line-height=29

tabs=2

horizontal-pad=12
vertical-pad=8
inner-pad=8

terminal=foot -a '{cmd}' -T '{cmd}' {cmd}

[border]
width=2
radius=11
selection-radius=5

[colors]
background=#101010ff      # voidAbyss
text=#ccccccff            # mistGray
prompt=#ccccccff          # mistGray
placeholder=#333333ff     # slateCore
input=#ccccccff           # mistGray
match=#62b086ff           # lichenGlow
selection=#295340ff       # forestCanopy
selection-text=#ccccccff  # mistGray
selection-match=#478061ff # voidGreen
counter=#62b086ff         # lichenGlow
border=#295340ff          # forestCanopy
