[theme]
theme = 'native'
[theme.overrides]
idle_fg = '#cccccc'      # mistGray
info_fg = '#62b086'      # lichenGlow
good_fg = '#478061'      # voidGreen
warning_fg = '#f0ad4e'   # solarAmber
critical_fg = '#a94442'  # crimsonDawn

[icons]
icons = 'awesome6'
[icons.overrides]
backlight = ''

[[block]]
block = 'scratchpad'
[block.theme_overrides]
idle_fg = '#333333'  # slateCore

[[block]]
block  = 'keyboard_layout'
driver = 'sway'
[block.mappings]
'English (US)' = '🇺🇸'
'Persian (N/A)' = '🇮🇷'

[[block]]
block = 'backlight'

[[block]]
block = 'temperature'
chip = 'k10temp-*'
format = ' $icon {$max}C '
info = 45
warning = 50
interval = 5

[[block]]
block = 'net'
device = 'wlp2s0'
format = ' $icon ^icon_net_down $speed_down.eng(p:M, w:3) ^icon_net_up $speed_up.eng(p:M, w:3) '
format_alt = ' $icon {$ssid|} '
interval = 2

[[block]]
block = 'battery'
format = ' $icon $percentage $power.eng(w:3) $time '
full_format = ' $icon '
empty_format = ' $icon $percentage '
not_charging_format = ' $icon $percentage '
charging_format = ' $icon $percentage $power.eng(w:3) $time '
info = 100
good = 80
warning = 10
interval = 5

[[block]]
block = 'amd_gpu'
format = ' $icon $utilization.eng(w:2) '
interval = 5

[[block]]
block = 'cpu'
format = ' $icon $utilization.eng(w:2) '
interval = 5

[[block]]
block = 'load'
format = ' $icon $1m.eng(w:3) '
interval = 5

[[block]]
block = 'disk_space'
format = ' $icon $available.eng(p:G, w:1) '
info_type = 'available'
alert_unit = 'GB'
interval = 30

[[block]]
block = 'memory'
format = ' $icon $mem_used.eng(p:G, w:3)~$mem_used_percents.eng(w:1) '
format_alt = ' $icon_swap $swap_used.eng(p:G, w:3)~$swap_used_percents.eng(w:1) '
interval = 5

[[block]]
block = 'sound'
driver = 'auto'

[[block]]
block = 'time'
format = " $timestamp.datetime(f:'%b-%d %H:%M:%S') "
interval = 10
